:root{
  --black:#000;
  --white:#fff;
  --grey:#9a9a9a;
  --display:'Pretendard','Paperlogy',sans-serif;
  --serif-en:'Pretendard','Paperlogy',sans-serif;
  --serif-ko:'Pretendard','Paperlogy',sans-serif;
  --sans:'Pretendard','Paperlogy',sans-serif;
  --header-h:80px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:var(--sans);font-weight:300}
button,input,select,textarea{font-family:var(--display);font:inherit}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* ===================== NAV (고정 상단바) ===================== */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.08);
  transition:background .3s;
}
.navbar .brand{
  font-family:var(--display);font-weight:800;font-size:24px;letter-spacing:.01em;color:var(--white);
}
.navbar .brand>span{display:inline-block;text-align:center;vertical-align:middle}
.navbar .brand small{
  display:block;font-family:var(--sans);font-weight:300;font-size:9px;letter-spacing:.16em;
  color:var(--grey);text-transform:lowercase;margin-top:1px;
}
.nav-menu{display:flex;align-items:center;gap:42px}
.nav-menu > li{position:relative}
.nav-menu > li > a{
  font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-weight:400;
  padding:10px 0;display:block;color:#ddd;transition:color .25s;
}
.nav-menu > li > a:hover{color:var(--white)}


/* mobile */
.hamburger{display:none;flex-direction:column;gap:6px;background:none;border:none;cursor:pointer;padding:8px}
.hamburger span{width:26px;height:1.5px;background:var(--white);transition:.3s}
@media(max-width:860px){
  .navbar{padding:0 22px}
  .nav-menu{
    position:fixed;inset:var(--header-h) 0 0 0;background:var(--black);
    flex-direction:column;gap:0;padding:30px 0;align-items:flex-start;
    transform:translateX(100%);transition:transform .35s;overflow-y:auto;
  }
  .nav-menu.open{transform:none}
  .nav-menu > li{width:100%}
  .nav-menu > li > a{padding:16px 30px;font-size:15px}
  .hamburger{display:flex}
}

/* ===================== 풀스크린 영상 섹션 (공통) ===================== */
.video-section{
  position:relative;height:100vh;height:100svh;width:100%;
  position:sticky;top:0;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:#000;
}
/* 16:9 영상을 화면에 cover로 채우는 래퍼 — 유튜브 iframe 교체용 */
.video-bg{
  position:absolute;top:50%;left:50%;
  width:max(100vw, 177.78vh);   /* 16:9 cover */
  height:max(100vh, 56.25vw);
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.video-bg iframe{width:100%;height:100%;border:0}

/* 영상이 없을 때의 플레이스홀더 (실제 배포 시 iframe으로 교체) */
.video-ph{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at var(--gx,30%) var(--gy,40%), rgba(255,255,255,.16), transparent 60%),
    linear-gradient(160deg,#0c0c0c,#000 55%,#161616);
  animation:drift 14s ease-in-out infinite alternate;
}
@keyframes drift{
  from{--gx:25%;--gy:35%;filter:brightness(.95)}
  to{--gx:72%;--gy:62%;filter:brightness(1.15)}
}
@property --gx{syntax:'<percentage>';inherits:false;initial-value:30%}
@property --gy{syntax:'<percentage>';inherits:false;initial-value:40%}
/* 필름 스캔라인 */
.video-ph::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.022) 3px 4px);
}
.dim{position:absolute;inset:0;background:rgba(0,0,0,.42)}

/* 오버레이 캡션 — RNS 스타일 (작은 카테고리 + 큰 타이틀) */
.caption{
  position:relative;z-index:5;text-align:center;padding:0 24px;
  opacity:0;transform:translateY(36px);
  transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);
}
.in-view .caption{opacity:1;transform:none}

/* ===== Works 카테고리 그리드 ===== */
.work-cat{background:#000;padding:110px 6vw}
.wc-head{display:flex;align-items:baseline;gap:16px;margin-bottom:36px;opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}
.wc-head .cat{font-size:13px;letter-spacing:.35em;color:#8a8a8a}
.wc-head h2{font-size:clamp(28px,4vw,52px);font-weight:800;letter-spacing:.02em;color:#fff}
.work-cat .wc-grid,.work-cat .wc-soon{opacity:0;transform:translateY(26px);transition:opacity .7s ease .15s,transform .7s ease .15s}
.work-cat.in-view .wc-head,.work-cat.in-view .wc-grid,.work-cat.in-view .wc-soon{opacity:1;transform:none}
.wc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:18px}
.vcard{position:relative;aspect-ratio:16/9;background:#101010;overflow:hidden;border-radius:6px;cursor:pointer;display:block}
.vcard img{width:100%;height:100%;object-fit:cover;opacity:.85;transition:transform .5s ease,opacity .3s ease}
.vcard:hover img{transform:scale(1.04);opacity:1}
.vcard .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.75);transition:background .3s ease}
.vcard .play::after{content:"";position:absolute;left:55%;top:50%;transform:translate(-50%,-50%);border-style:solid;border-width:9px 0 9px 15px;border-color:transparent transparent transparent #fff}
.vcard:hover .play{background:rgba(255,255,255,.18)}
.vcard iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vcard.pl:hover{border-color:#555}
.wc-soon{color:#777;font-size:clamp(16px,2vw,20px);letter-spacing:.25em}
.wp-row .soon{font-style:normal;font-size:11px;letter-spacing:.18em;color:#999;vertical-align:super;margin-left:6px}
/* ===== 서브페이지 작업 카드 (영상+제목+파트) ===== */
.work-item{display:flex;flex-direction:column}
.work-item .vcard{width:100%}
.wi-title{margin-top:13px;font-size:16px;font-weight:600;color:#fff;letter-spacing:.01em;line-height:1.4}
.wi-parts{margin-top:5px;font-size:13px;color:#9a9a9a;line-height:1.55}

.brandname{text-transform:none!important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* 홈 캡션 부가요소 */
.caption .view-all{display:inline-block;margin-top:28px;padding:12px 28px;border:1px solid rgba(255,255,255,.55);color:#fff;text-decoration:none;font-size:13px;letter-spacing:.08em;background:rgba(0,0,0,.25);transition:background .3s,color .3s}
.caption .view-all:hover{background:#fff;color:#000}
.caption .soon-note{margin-top:24px;color:#9a9a9a;letter-spacing:.3em;font-size:14px}
/* ===== ABOUT 섹션 ===== */
.about{min-height:100vh;position:sticky;top:0;display:flex;align-items:center;justify-content:center;padding:0 8vw;background:#000;position:relative}
.about-inner{max-width:760px}
.about-eyebrow{font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:#8a8a8a;margin-bottom:26px}
.about-h{font-size:clamp(30px,5vw,60px);font-weight:800;letter-spacing:.01em;margin-bottom:30px;color:#fff;line-height:1.15}
.about-text{font-size:clamp(15px,1.7vw,19px);line-height:1.95;color:#c4c4c4}
/* 카테고리 캡션 소개 한 줄 */
.caption .cat-desc{margin-top:14px;max-width:30ch;font-size:14px;line-height:1.6;color:#cfcfcf}
.video-section.ws.alt .caption .cat-desc{margin-left:auto}


/* ===== 카테고리 섹션 구분 강화 ===== */
.video-section.ws{border-top:1px solid rgba(255,255,255,.16)}
.video-section.ws .ghost{position:absolute;top:9vh;right:6vw;z-index:4;font-size:min(34vmin,300px);font-weight:800;line-height:1;letter-spacing:.06em;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.45);text-stroke:2px rgba(255,255,255,.45);pointer-events:none;user-select:none}
.video-section.ws.alt .ghost{right:auto;left:6vw}
.video-section.ws .dim{background:linear-gradient(25deg,rgba(0,0,0,.8) 0%,rgba(0,0,0,.28) 50%,rgba(0,0,0,.4) 100%)}
.video-section.ws.alt .dim{background:linear-gradient(-25deg,rgba(0,0,0,.8) 0%,rgba(0,0,0,.28) 50%,rgba(0,0,0,.4) 100%)}
.video-section.ws .caption{position:absolute;left:6vw;bottom:9vh;text-align:left;padding:0}
.video-section.ws.alt .caption{left:auto;right:6vw;text-align:right}
.video-section.ws .caption .cat{display:inline-block;border:1px solid rgba(255,255,255,.4);padding:7px 16px;border-radius:999px;font-size:11px;letter-spacing:.28em;color:#d6d6d6;margin-bottom:20px}


/* Works 서브페이지 */
#subpage{position:fixed;inset:0;z-index:4000;background:#000;overflow-y:auto;opacity:0;visibility:hidden;transition:opacity .35s ease,visibility .35s ease}
#subpage.show{opacity:1;visibility:visible}
#subpage .sp-inner{padding:34px 6vw 90px;min-height:100%}
.sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:64px}
.sp-head small{letter-spacing:.3em;color:#8a8a8a;font-size:11px}
.sp-works{background:none;border:0;cursor:pointer;font-family:inherit;letter-spacing:.3em;color:#8a8a8a;font-size:11px;padding:6px 2px;transition:color .25s}
.sp-works:hover{color:#fff}
#spBack{background:none;border:1px solid rgba(255,255,255,.4);color:#fff;padding:10px 22px;font-size:13px;letter-spacing:.03em;cursor:pointer;font-family:inherit;transition:background .3s,color .3s}
#spBack:hover{background:#fff;color:#000}
.sp-num{font-size:13px;letter-spacing:.35em;color:#8a8a8a;margin-bottom:10px}
.sp-title{font-size:clamp(34px,5vw,64px);font-weight:800;color:#fff;margin-bottom:44px}


.caption .cat{
  font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:#cfcfcf;
  margin-bottom:22px;font-weight:400;
}
.caption h2{
  font-family:var(--display);font-weight:800;
  font-size:clamp(38px,7vw,86px);letter-spacing:.02em;line-height:1.08;
  text-transform:uppercase;
}
.caption h2 .ko{font-weight:800}

/* ===================== HERO (웅필름식 쇼릴) ===================== */
.hero .caption h1{
  font-family:var(--display);font-weight:800;
  font-size:clamp(52px,10vw,128px);letter-spacing:.04em;line-height:1;
}
.hero .caption .sub{
  font-weight:300;font-size:clamp(15px,2vw,21px);
  letter-spacing:.45em;margin-top:16px;color:#e8e8e8;
}
.hero .scroll-hint{
  position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:6;
  font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#999;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.hero .scroll-hint::after{
  content:"";width:1px;height:46px;background:rgba(255,255,255,.6);
  animation:line 1.8s ease-in-out infinite;transform-origin:top;
}
@keyframes line{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* ===================== CONTACT / FOOTER (RNS식) ===================== */
.contact{
  text-align:center;padding:130px 24px 0;background:var(--black);
  position:sticky;top:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;
}
.contact .cat{font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--grey);margin-bottom:24px}
.contact h2{
  font-family:var(--display);font-weight:800;font-size:clamp(40px,7vw,84px);
  text-transform:uppercase;margin-bottom:36px;
}
.contact .info{font-size:13.5px;letter-spacing:.14em;line-height:2.3;color:#ccc}
.sns{
  display:flex;justify-content:center;gap:70px;margin:80px 0 90px;
}
.sns a{
  font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#ddd;
  position:relative;padding-bottom:6px;
}
.sns a::after{
  content:"";position:absolute;left:0;bottom:0;width:100%;height:1px;background:var(--white);
  transform:scaleX(0);transition:transform .4s cubic-bezier(.7,0,.2,1);transform-origin:left;
}
.sns a:hover::after{transform:scaleX(1)}
.copyright{
  border-top:1px solid rgba(255,255,255,.1);
  text-align:center;padding:30px 20px;
  font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:#777;
}

/* ===================== INTRO : 클래퍼보드 로고 시퀀스 ===================== */
body.lock{overflow:hidden}
#intro{
  position:fixed;inset:0;z-index:5000;background:#000;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  animation:introOut .7s cubic-bezier(.76,0,.18,1) 3.21s forwards;
}
/* 이미 본 탭이면 인트로를 처음부터 제거 — 애니메이션 시작 전이라 깜빡임 없음 */
html.intro-seen #intro{display:none!important;animation:none!important}
@keyframes introOut{to{transform:translateY(-101%)}}
#intro.skip{animation:none;transition:opacity .35s;opacity:0;pointer-events:none}
#introSkip{position:absolute;right:24px;bottom:22px;z-index:5001;background:none;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.82);font:inherit;font-size:12px;letter-spacing:.18em;padding:9px 16px;cursor:pointer;transition:background .25s,color .25s,border-color .25s}
#introSkip:hover{background:#fff;color:#000;border-color:#fff}
/* 클랩 순간 화이트 플래시 */
#intro::after{
  content:"";position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  animation:flash .32s ease-out 1.62s;
}
@keyframes flash{12%{opacity:.85}100%{opacity:0}}

#introLogo{position:relative;width:min(56vmin,400px);aspect-ratio:1418/1419;animation:clapShake .34s linear 1.62s;}
#introLogo img{position:absolute;display:block;height:auto}
@keyframes clapShake{
  0%,100%{transform:none}
  18%{transform:translate(4px,3px) rotate(.7deg)}
  38%{transform:translate(-5px,-2px) rotate(-.6deg)}
  58%{transform:translate(3px,2px)}
  78%{transform:translate(-2px,1px)}
}

/* 2) 바퀴 4개 — 왼쪽에서 굴러 들어와 제자리에 */
#intro .wh{
  transform:translateX(-140vw) rotate(-720deg);
  animation:wheelIn .55s cubic-bezier(.2,.7,.25,1) forwards;
}
#intro .wh:nth-of-type(1){animation-delay:.2s}
#intro .wh:nth-of-type(2){animation-delay:.3s}
#intro .wh:nth-of-type(3){animation-delay:.4s}
#intro .wh:nth-of-type(4){animation-delay:.5s}
@keyframes wheelIn{to{transform:translateX(0) rotate(0deg)}}

/* 1) 몸판(슬레이트 전체) — 클래퍼보드 자세(-90°)로 시작, 클랩 후 로고 방향으로 회전 복귀 */
#intro .clap{
  position:absolute;
  left:21.439%;top:21.494%;width:60.085%;height:45.032%;
  transform-origin:50% 50%;
  transform:translateY(-24%) rotate(-90deg);
  animation:bodyTurn .7s cubic-bezier(.68,0,.22,1) 1.8s forwards;
  /* 클립을 본체(.clap) 로컬좌표에 '정적'으로 고정 — 본체와 함께 회전.
     본체 윗변(로컬 top -0.3%) 위로 삐져나오는 날 꼬리만 상시 제거.
     [중요] 이전엔 clapClip으로 클립을 시간 토글(ON/OFF)했으나, 클립 애니메이션과
     slate/body transform이 서로 다른 합성 레이어에서 1프레임 어긋나며(GPU 합성 desync)
     반동 순간 날 왼쪽이 순간적으로 튀어나오는 프레임이 발생함.
     정적 고정 시 클립값이 매 프레임 동일 → transform과 어긋날 수 없어 누출 프레임 소멸.
     실측: -0.3% 클립은 본체 0°(완성 로고)에서 로고 손실 1px로 무해, 모든 날 각도에서 누출 0px. */
  clip-path:polygon(-200% -0.3%, 300% -0.3%, 300% 300%, -200% 300%);
}
@keyframes bodyTurn{
  to{transform:translateY(0) rotate(0deg)}
}
#intro .clap .bodyimg{left:0.000%;top:0.000%;width:42.136%}

/* 3) 슬레이트 스틱 — 들어올림 → 4) 클랩 (바퀴 도착 직후) */
#intro .slate{
  left:28.991%;top:0.000%;width:71.009%;
  transform-origin:18.35% 31.61%;
  animation:slateGo 1.1s 1.05s forwards, swapHide .01s linear 2.50s forwards;
}
@keyframes slateGo{
  0%  {transform:rotate(0deg);animation-timing-function:cubic-bezier(.3,.75,.3,1)}
  30% {transform:rotate(-28deg)}                                                   /* 들어올림 */
  40% {transform:rotate(-28deg);animation-timing-function:cubic-bezier(.85,0,1,.5)}/* 짧은 홀드 */
  52% {transform:rotate(24deg);animation-timing-function:ease-out}                 /* 착! (보드와 평행) */
  64% {transform:rotate(-6deg);animation-timing-function:ease-in-out}              /* 반동 */
  78% {transform:rotate(2deg)}
  100%{transform:rotate(0deg)}
}

let WORKS = DEFAULT_WORKS;

const esc = s => (s||'').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const pad2 = n => String(n).padStart(2,'0');
const bgUrl = id => 'https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&mute=1&loop=1&playlist='+id+'&controls=0&rel=0&playsinline=1&modestbranding=1&iv_load_policy=3&disablekb=1';

const sub = document.getElementById('subpage');
const spGrid = sub.querySelector('.wc-grid');
const spSoon = sub.querySelector('.wc-soon');

function buildPanel(){
  const list = document.getElementById('wpList'); list.innerHTML='';
  WORKS.categories.forEach((c,i)=>{
    const a=document.createElement('a'); a.className='wp-row'; a.href='/works/'+c.key;
    a.innerHTML='<i>'+pad2(i+1)+'</i><strong>'+esc(c.title)+(c.soon?' <em class="soon">soon</em>':'')
      +'</strong><svg class="arr" viewBox="0 0 24 24"><path d="M5 5 L19 19 M19 8 V19 H8"/></svg>';
    list.appendChild(a);
  });
}
function buildStack(){
  const stack=document.getElementById('worksStack'); stack.innerHTML='';
  WORKS.categories.forEach((c,i)=>{
    const num=pad2(i+1), alt=(i%2===1)?' alt':'';
    const rep=(c.videos&&c.videos[0])?c.videos[0].id:null;
    const media=(c.soon||!rep)
      ? '<div class="video-ph" style="animation-duration:16s;animation-delay:-6s"></div>'
      : '<div class="video-bg"><iframe data-src="'+bgUrl(rep)+'" title="'+esc(c.title)+' 대표영상" allow="autoplay; encrypted-media"></iframe></div>';
    const cta=c.soon ? '<p class="soon-note">업로드 예정</p>'
                     : '<a class="view-all" href="/works/'+c.key+'">전체 보기 &rarr;</a>';
    const sec=document.createElement('section'); sec.className='video-section ws'+alt; sec.id='w-'+c.key;
    sec.innerHTML=media+'<div class="dim"></div><span class="ghost">'+num+'</span>'
      +'<div class="caption"><p class="cat">WORKS &mdash; '+num+'</p><h2>'+esc(c.title)+'</h2>'+(c.desc?'<p class="cat-desc">'+esc(c.desc)+'</p>':'')+cta+'</div>';
    stack.appendChild(sec);
  });
}
function setHero(){ const f=document.querySelector('#top iframe'); if(f&&WORKS.hero) f.dataset.src=bgUrl(WORKS.hero); }

function bindPlay(item){
  const v=item.querySelector('.vthumb'); if(!v) return;
  v.addEventListener('click',()=>{
    if(v.classList.contains('on')) return;
    v.classList.add('on');
    v.innerHTML='<iframe src="https://www.youtube-nocookie.com/embed/'+v.dataset.id
      +'?autoplay=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
  });
}
const findCat = key => WORKS.categories.find(c=>c.key===key);

const openSub = key => {
  const w=findCat(key); if(!w) return;
  const idx=WORKS.categories.indexOf(w);
  sub.querySelector('.sp-num').textContent=pad2(idx+1);
  sub.querySelector('.sp-title').textContent=w.title;
  spGrid.innerHTML=''; spSoon.hidden=!w.soon;
  (w.videos||[]).forEach(v=>{
    const it=document.createElement('div'); it.className='work-item';
    it.innerHTML='<div class="vcard vthumb" data-id="'+v.id+'"><img src="https://i.ytimg.com/vi/'+v.id
      +'/hqdefault.jpg" alt="'+esc(v.title||w.title)+' 영상 썸네일" loading="lazy"><span class="play"></span></div>'
      +(v.title?'<p class="wi-title">'+esc(v.title)+'</p>':'')
      +(v.parts?'<p class="wi-parts">'+esc(v.parts).replace(/\n/g,'<br>')+'</p>':'');
    bindPlay(it); spGrid.appendChild(it);
  });
  sub.classList.add('show'); sub.setAttribute('aria-hidden','false'); sub.scrollTop=0;
  document.body.classList.add('lock');
};
const closeSub = () => {
  if(!sub.classList.contains('show')) return;
  sub.classList.remove('show'); sub.setAttribute('aria-hidden','true');
  document.body.classList.remove('lock'); spGrid.innerHTML='';
};
const openPath = key => { closePanel(); openSub(key); history.pushState({k:key},'', '/works/'+key); };
document.addEventListener('click', e=>{
  const a=e.target.closest('a[href^="/works/"]'); if(!a) return;
  const m=a.getAttribute('href').match(/^\/works\/([A-Za-z0-9_-]+)\/?$/);
  if(m && findCat(m[1])){ e.preventDefault(); openPath(m[1]); }
});
window.addEventListener('popstate', ()=>{
  const m=location.pathname.match(/^\/works\/([A-Za-z0-9_-]+)\/?$/);
  if(m && findCat(m[1])) openSub(m[1]); else closeSub();
});
document.getElementById('spBack').addEventListener('click', ()=>{ history.pushState(null,'','/'); closeSub(); });
const route = () => {
  const m=location.pathname.match(/^\/works\/([A-Za-z0-9_-]+)\/?$/);
  if(m && findCat(m[1])){ closePanel(); openSub(m[1]); return; }
  const h=location.hash.match(/^#works\/([A-Za-z0-9_-]+)$/);
  if(h && findCat(h[1])){ closePanel(); openSub(h[1]); } else closeSub();
};

const ioBg = new IntersectionObserver(es => es.forEach(e=>{
  if(!e.isIntersecting) return;
  const f=e.target.querySelector('iframe[data-src]');
  if(f){ f.src=f.dataset.src; f.removeAttribute('data-src'); }
  ioBg.unobserve(e.target);
}), {rootMargin:'150% 0px'});
function observeVideos(){ document.querySelectorAll('.video-section').forEach(s=>{ ioBg.observe(s); io.observe(s); }); }

async function loadWorks(){
  // 1순위: Supabase 클라우드 (모든 방문자 공통, 관리자가 저장한 최신본)
  try{ if(window.SKARTE_SUPABASE && window.SKARTE_SUPABASE.isConfigured()){
    const c=await window.SKARTE_SUPABASE.loadWorks(); if(c){ WORKS=c; return; }
  } }catch(e){}
  // 2순위: 이 브라우저의 미리보기 저장본
  try{ const l=localStorage.getItem('skarte_works'); if(l){ WORKS=JSON.parse(l); return; } }catch(e){}
  // 3순위: 정적 works.json
  try{ const r=await fetch('works.json',{cache:'no-store'}); if(r.ok) WORKS=await r.json(); }catch(e){}
}
function setAbout(){ const a=document.querySelector('.about-text'); if(a && WORKS.about) a.textContent=WORKS.about; }
loadWorks().then(()=>{ buildPanel(); buildStack(); setHero(); observeVideos(); route(); });

</script>
