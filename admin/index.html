<head>
<meta charset="UTF-8">

<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css");
:root{
  --bg:#0a0a0a; --panel:#131313; --panel2:#1a1a1a; --panel3:#0e0e0e;
  --line:rgba(255,255,255,.12); --line2:rgba(255,255,255,.07);
  --tx:#f2f2f2; --mut:#8a8a8a; --mut2:#6a6a6a; --acc:#fff;
  --ok:#7CFFB0; --warn:#ff6b5e;
  --hdr-h:68px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:#fff;color:#000}

/* ===== Header ===== */
header{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;flex:none}
.brand img{width:30px;height:30px;border-radius:0}
.brand .bt{display:flex;flex-direction:column;line-height:1.1}
.brand .bt b{font-size:15px;font-weight:800;letter-spacing:.02em}
.brand .bt small{font-size:9px;letter-spacing:.26em;color:var(--mut);text-transform:uppercase;margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

button{font:inherit;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--tx);
  padding:9px 15px;border-radius:0;letter-spacing:.03em;font-size:13.5px;transition:background .2s,color .2s,border-color .2s;white-space:nowrap}
button:hover{background:#fff;color:#000;border-color:#fff}
button:active{transform:translateY(1px)}
button:disabled{opacity:.4;cursor:not-allowed}
button:disabled:hover{background:transparent;color:var(--tx);border-color:var(--line)}
button.primary{background:#fff;color:#000;border-color:#fff;font-weight:700}
button.primary:hover{background:#d8d8d8;border-color:#d8d8d8}
button.sm{padding:6px 11px;font-size:12.5px}
button.icon{padding:6px 10px;min-width:34px;font-size:14px;color:var(--mut)}
button.icon:hover{color:#000}
button.danger{color:var(--warn);border-color:rgba(255,107,94,.4)}
button.danger:hover{background:var(--warn);color:#0a0a0a;border-color:var(--warn)}

/* ===== Auth bar ===== */
#authbar{position:sticky;top:var(--hdr-h);z-index:15;background:var(--panel3);border-bottom:1px solid var(--line);
  padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px}
#authbar .auth-status{color:var(--mut);flex:1 1 auto;min-width:180px}
#authbar .auth-inputs{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#authbar input{font:inherit;font-size:13px;color:var(--tx);padding:7px 11px;border:1px solid var(--line);background:#070707;border-radius:0}
#authbar input:focus{outline:none;border-color:rgba(255,255,255,.4)}
#authbar #authEmail{width:190px;max-width:46vw}
#authbar #authPw{width:140px;max-width:34vw}

/* ===== Layout ===== */
main{max-width:1040px;margin:0 auto;padding:24px 24px 100px}
.hint{background:linear-gradient(180deg,#161616,#101010);border:1px solid var(--line);border-left:3px solid rgba(255,255,255,.35);
  border-radius:0;padding:15px 18px;margin-bottom:24px;font-size:13px;color:#c7c7c7;line-height:1.7}
.hint b{color:#fff}
.hint .muted{color:var(--mut)}

.eyebrow{font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--mut);margin:26px 2px 12px;display:flex;align-items:center;gap:12px}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--line2)}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:500}
.field input,.field textarea{font:inherit;font-size:14px;color:var(--tx);padding:10px 12px;border:1px solid var(--line);border-radius:0;background:var(--panel3);width:100%;transition:border-color .2s,background .2s}
.field input:focus,.field textarea:focus{outline:none;border-color:rgba(255,255,255,.5);background:#0a0a0a}
.field input::placeholder,.field textarea::placeholder{color:var(--mut2)}
.field textarea{resize:vertical;min-height:54px;line-height:1.5}

/* Hero card */
.hero-card{background:var(--panel);border:1px solid var(--line);padding:18px 20px;margin-bottom:8px;max-width:480px}

/* ===== Category card ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:0;padding:0;margin-bottom:18px;overflow:hidden}
.cat-head{display:flex;align-items:center;gap:12px;padding:16px 20px;background:linear-gradient(180deg,#171717,#131313);
  border-bottom:1px solid var(--line);flex-wrap:wrap}
.cat-head .num{font-size:13px;letter-spacing:.16em;color:var(--mut);min-width:24px;font-weight:600}
.cat-head .grow{flex:1;min-width:150px;font-size:18px;font-weight:700;font-family:inherit;color:#fff;
  background:transparent;border:0;border-bottom:1px solid transparent;border-radius:0;padding:5px 2px;transition:border-color .2s}
.cat-head .grow:hover{border-bottom-color:var(--line)}
.cat-head .grow:focus{outline:none;border-bottom-color:rgba(255,255,255,.6)}
.cat-head label.chk{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#bdbdbd;flex:none;letter-spacing:.02em;cursor:pointer;user-select:none}
.cat-head input[type=checkbox]{accent-color:#fff;width:15px;height:15px;cursor:pointer}
.cat-head .head-tools{display:flex;gap:6px;flex:none}
.cat-body{padding:18px 20px 20px}
.cat-body>.field{margin-bottom:18px}

.vids-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:6px 0 12px;display:flex;align-items:center;gap:8px}
.vids-label .cnt{color:#fff;background:rgba(255,255,255,.1);padding:1px 8px;font-size:11px;letter-spacing:.05em}

/* ===== Video row ===== */
.vid{border:1px solid var(--line2);border-radius:0;padding:14px;margin-bottom:12px;background:var(--panel2);position:relative;transition:border-color .2s}
.vid:hover{border-color:rgba(255,255,255,.16)}
.vid .vid-top{display:grid;grid-template-columns:148px 1fr auto;gap:16px;align-items:start}
.vid .thumb-wrap{position:relative;flex:none}
.vid .thumb{width:148px;aspect-ratio:16/9;object-fit:cover;border-radius:0;background:#000;border:1px solid var(--line2);display:block}
.vid .thumb-wrap .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:.1em;color:var(--mut2);text-transform:uppercase;pointer-events:none}
.vid .vid-fields{min-width:0;display:grid;grid-template-columns:1fr 1fr;gap:11px 14px}
.vid .vid-fields .field.full{grid-column:1/-1}
.vid .vtools{display:flex;flex-direction:column;gap:6px;flex:none}

.muted{color:var(--mut);font-size:13px}

/* ===== Toast ===== */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);background:#fff;color:#000;
  padding:11px 22px;border-radius:0;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;font-size:14px;font-weight:600;letter-spacing:.02em;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Category tabs ===== */
.cat-tabs{position:sticky;top:calc(var(--hdr-h) + 41px);z-index:9;display:flex;gap:8px;flex-wrap:wrap;padding:14px 0 16px;background:var(--bg);margin:0 -4px}
.cat-tab{font:inherit;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--mut);
  padding:8px 14px;border-radius:0;font-size:13px;letter-spacing:.02em;transition:all .2s;display:flex;align-items:center;gap:7px}
.cat-tab:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.cat-tab.active{background:#fff;color:#000;border-color:#fff;font-weight:600}
.cat-tab .tnum{font-size:11px;opacity:.55}
.cat-tab.add{border-style:dashed;color:#bdbdbd}
.cat-tab.add:hover{color:#fff;border-color:rgba(255,255,255,.5)}
#cats .card{display:none}
#cats .card.show{display:block}
#addCat{display:none}

/* ===== Mobile (≤720px) ===== */
@media (max-width:720px){
  :root{--hdr-h:auto}
  header{padding:12px 16px;gap:12px}
  header .brand{flex:1 1 100%}
  .actions{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .actions button{width:100%;font-size:12.5px;padding:11px 8px;text-align:center}
  .actions button.primary{grid-column:1/-1}
  #authbar{position:static;padding:12px 16px;flex-direction:column;align-items:stretch}
  #authbar .auth-status{min-width:0;flex:none}
  #authbar .auth-inputs{flex-direction:column;align-items:stretch}
  #authbar input,#authbar #authEmail,#authbar #authPw{width:100%;max-width:none}
  #authbar .auth-inputs button{width:100%}
  main{padding:18px 16px 80px}
  .hint{padding:14px;font-size:12.5px}
  .hero-card{padding:16px}
  .cat-tabs{position:static;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -16px;padding:10px 16px 14px}
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{flex:none;white-space:nowrap}
  .cat-head{padding:14px 16px;gap:10px}
  .cat-head .grow{font-size:16px;flex:1 1 100%;order:-1}
  .cat-head .num{order:-2}
  .cat-head label.chk{flex:1 1 auto}
  .cat-head .head-tools{margin-left:auto}
  .cat-body{padding:16px}
  .vid{padding:12px}
  .vid .vid-top{grid-template-columns:1fr;gap:12px}
  .vid .thumb,.vid .thumb-wrap{width:100%}
  .vid .thumb{aspect-ratio:16/9}
  .vid .vid-fields{grid-template-columns:1fr;gap:11px}
  .vid .vtools{flex-direction:row;justify-content:flex-end}
  .vid .vtools button{flex:1}
  .vid .vtools button.danger{flex:0 0 auto}
}
@media (max-width:420px){
  .actions{grid-template-columns:1fr}
  .actions button.primary{grid-column:auto}
}
</style>

const LS_KEY='skarte_works';

/* ===== Supabase 클라우드 연동 ===== */
const SB = window.SKARTE_SUPABASE;
const TOKEN_KEY = 'skarte_admin_token';
let authToken = null;
try{ authToken = sessionStorage.getItem(TOKEN_KEY) || null; }catch(e){}

function refreshAuthUI(){
  const st=document.getElementById('authStatus');
  const loginBtn=document.getElementById('loginBtn');
  const logoutBtn=document.getElementById('logoutBtn');
  const emailIn=document.getElementById('authEmail');
  const pwIn=document.getElementById('authPw');
  const cloudBtn=document.getElementById('cloudSaveBtn');
  if(!SB || !SB.isConfigured()){
    st.textContent='클라우드: Supabase 미설정 (supabase.js 에 URL/KEY 입력 필요)';
    st.style.color='#ff6b5e';
    loginBtn.disabled=true; cloudBtn.disabled=true;
    return;
  }
  if(authToken){
    st.textContent='클라우드: 로그인됨 ✓ — 저장 시 공개 사이트에 즉시 반영';
    st.style.color='#7CFFB0';
    loginBtn.hidden=true; logoutBtn.hidden=false; emailIn.hidden=true; pwIn.hidden=true;
    cloudBtn.disabled=false;
  }else{
    st.textContent='클라우드: 로그아웃 상태 — 저장하려면 로그인하세요';
    st.style.color='var(--mut)';
    loginBtn.hidden=false; logoutBtn.hidden=true; emailIn.hidden=false; pwIn.hidden=false;
    cloudBtn.disabled=false; // 누르면 로그인 안내
  }
}

document.getElementById('loginBtn').onclick=async()=>{
  const email=document.getElementById('authEmail').value.trim();
  const pw=document.getElementById('authPw').value;
  if(!email||!pw){ toast('이메일과 비밀번호를 입력하세요'); return; }
  try{
    const res=await SB.signIn(email,pw);
    authToken=res.access_token;
    try{ sessionStorage.setItem(TOKEN_KEY,authToken); }catch(e){}
    document.getElementById('authPw').value='';
    toast('로그인 성공'); refreshAuthUI();
  }catch(err){ alert('로그인 실패: '+err.message); }
};
document.getElementById('logoutBtn').onclick=()=>{
  authToken=null; try{ sessionStorage.removeItem(TOKEN_KEY); }catch(e){}
  toast('로그아웃됨'); refreshAuthUI();
};

    }
  ],
  "about": "skARTe Film(skartefilms)는 인천을 기반으로 활동하는 영상 제작사입니다. 공연·브랜드필름·광고·하이라이트·라이브 중계까지, 기획부터 촬영·편집·송출을 한 팀에서 책임집니다. 브랜드와 무대의 순간을 또렷한 영상으로 남깁니다."
};

let data;
const $=s=>document.querySelector(s);
const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1800);};
const extractId=s=>{ s=(s||'').trim(); const m=s.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/); return m?m[1]:s; };
const slug=s=>(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||('cat'+Date.now());

async function init(){
  // 1순위: 클라우드(공개 최신본) → 2순위: 미리보기 localStorage → 3순위: works.json → 4순위: 기본값
  try{ if(SB && SB.isConfigured()){ const c=await SB.loadWorks(); if(c){ data=c; } } }catch(e){}
  if(!data){ try{ const l=localStorage.getItem(LS_KEY); if(l){ data=JSON.parse(l); } }catch(e){} }
  if(!data){ try{ const r=await fetch('../works.json',{cache:'no-store'}); if(r.ok) data=await r.json(); }catch(e){} }
  if(!data) data=structuredClone(DEFAULT_WORKS);
  $('#hero').value=data.hero||'';
  render();
  refreshAuthUI();
}
$('#hero').addEventListener('input',e=>{ data.hero=extractId(e.target.value); });

function render(){
  const wrap=$('#cats'); wrap.innerHTML='';
  data.categories.forEach((c,ci)=>{
    const card=document.createElement('div'); card.className='card'; card.dataset.idx=ci;
    const vcount=(c.videos||[]).length;
    card.innerHTML=`
      <div class="cat-head">
        <span class="num">${String(ci+1).padStart(2,'0')}</span>
        <input class="grow" data-k="title" placeholder="카테고리 이름" value="${(c.title||'').replace(/"/g,'&quot;')}">
        <label class="chk"><input type="checkbox" data-k="soon" ${c.soon?'checked':''}> 업로드 예정(soon)</label>
        <div class="head-tools">
          <button class="icon" data-act="up" title="위로">↑</button>
          <button class="icon" data-act="down" title="아래로">↓</button>
          <button class="sm danger" data-act="delcat">삭제</button>
        </div>
      </div>
      <div class="cat-body">
        <div class="field">
          <label>카테고리 소개문 (카테고리 페이지 상단·홈 캡션에 표시)</label>
          <textarea data-k="desc" placeholder="이 카테고리에 대한 한두 문장 소개">${(c.desc||'').replace(/</g,'&lt;')}</textarea>
        </div>
        <div class="vids-label">영상 목록 <span class="cnt">${vcount}</span></div>
        <div class="vids"></div>
        <button class="sm" data-act="addvid">+ 영상 추가</button>
      </div>
    `;
    // 카테고리 필드
    card.querySelector('[data-k="title"]').addEventListener('input',e=>{c.title=e.target.value;});
    card.querySelector('[data-k="soon"]').addEventListener('change',e=>{c.soon=e.target.checked; if(!c.soon)delete c.soon;});
    card.querySelector('[data-k="desc"]').addEventListener('input',e=>{ c.desc=e.target.value; });
    card.querySelector('[data-act="up"]').onclick=()=>{ if(ci>0){[data.categories[ci-1],data.categories[ci]]=[data.categories[ci],data.categories[ci-1]];render();} };
    card.querySelector('[data-act="down"]').onclick=()=>{ if(ci<data.categories.length-1){[data.categories[ci+1],data.categories[ci]]=[data.categories[ci],data.categories[ci+1]];render();} };
    card.querySelector('[data-act="delcat"]').onclick=()=>{ if(confirm('이 카테고리를 삭제할까요?')){ data.categories.splice(ci,1); render(); } };
    card.querySelector('[data-act="addvid"]').onclick=()=>{ (c.videos=c.videos||[]).push({id:'',title:'',parts:''}); render(); };

    const vbox=card.querySelector('.vids');
    (c.videos||[]).forEach((v,vi)=>{
      const row=document.createElement('div'); row.className='vid';
      row.innerHTML=`
        <div class="vid-top">
          <div class="thumb-wrap">
            <img class="thumb" src="${v.id?`https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`:''}" alt="">
            ${v.id?'':'<span class="ph">미리보기</span>'}
          </div>
          <div class="vid-fields">
            <div class="field full"><label>영상 ID / 링크</label><input data-vk="id" value="${(v.id||'').replace(/"/g,'&quot;')}" placeholder="유튜브 링크 또는 ID"></div>
            <div class="field full"><label>행사 제목</label><input data-vk="title" value="${(v.title||'').replace(/"/g,'&quot;')}" placeholder="예: 2025 OO 페스티벌"></div>
            <div class="field"><label>참여 파트</label><input data-vk="parts" value="${(v.parts||'').replace(/"/g,'&quot;')}" placeholder="예: 촬영 · 편집 · 송출"></div>
            <div class="field"><label>업로드일 (선택 · YYYY-MM-DD)</label><input data-vk="date" value="${(v.date||'').replace(/"/g,'&quot;')}" placeholder="2025-06-01"></div>
          </div>
          <div class="vtools">
            <button class="icon" data-act="vup" title="위로">↑</button>
            <button class="icon" data-act="vdown" title="아래로">↓</button>
            <button class="sm danger" data-act="vdel">삭제</button>
          </div>
        </div>`;
      const idInput=row.querySelector('[data-vk="id"]');
      idInput.addEventListener('input',e=>{ v.id=extractId(e.target.value); });
      idInput.addEventListener('blur',e=>{ e.target.value=v.id; row.querySelector('.thumb').src=v.id?`https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`:''; const ph=row.querySelector('.ph'); if(ph)ph.style.display=v.id?'none':'flex'; });
      row.querySelector('[data-vk="title"]').addEventListener('input',e=>{v.title=e.target.value;});
      row.querySelector('[data-vk="parts"]').addEventListener('input',e=>{v.parts=e.target.value;});
      row.querySelector('[data-vk="date"]').addEventListener('input',e=>{ const d=e.target.value.trim(); if(d)v.date=d; else delete v.date; });
      row.querySelector('[data-act="vup"]').onclick=()=>{ if(vi>0){[c.videos[vi-1],c.videos[vi]]=[c.videos[vi],c.videos[vi-1]];render();} };
      row.querySelector('[data-act="vdown"]').onclick=()=>{ if(vi<c.videos.length-1){[c.videos[vi+1],c.videos[vi]]=[c.videos[vi],c.videos[vi+1]];render();} };
      row.querySelector('[data-act="vdel"]').onclick=()=>{ c.videos.splice(vi,1); render(); };
      vbox.appendChild(row);
    });
    // 카테고리명 입력 시 탭 라벨도 갱신
    card.querySelector('[data-k="title"]').addEventListener('input',e=>{ const t=document.querySelector('.cat-tab[data-idx="'+ci+'"] .tlabel'); if(t)t.textContent=e.target.value||'(이름 없음)'; });
    wrap.appendChild(card);
  });
  if(activeIdx>=data.categories.length) activeIdx=data.categories.length-1;
  if(activeIdx<0) activeIdx=0;
  buildTabs(); showActive();
}
let activeIdx=0;
function buildTabs(){
  const t=$('#catTabs'); t.innerHTML='';
  data.categories.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='cat-tab'+(i===activeIdx?' active':''); b.dataset.idx=i;
    b.innerHTML='<span class="tnum">'+String(i+1).padStart(2,'0')+'</span><span class="tlabel">'+((c.title||'(이름 없음)')).replace(/</g,'&lt;')+'</span>'+(c.soon?' · soon':'');
    b.onclick=()=>{ activeIdx=i; buildTabs(); showActive(); window.scrollTo({top:0,behavior:'smooth'}); };
    t.appendChild(b);
  });
  const add=document.createElement('button'); add.className='cat-tab add'; add.textContent='+ 카테고리 추가';
  add.onclick=()=>{ const tt='새 카테고리'; data.categories.push({key:slug(tt)+'-'+Date.now().toString(36).slice(-3),title:tt,videos:[]}); activeIdx=data.categories.length-1; render(); };
  t.appendChild(add);
}
function showActive(){ document.querySelectorAll('#cats .card').forEach(card=>{ card.classList.toggle('show', +card.dataset.idx===activeIdx); }); }

$('#addCat').onclick=()=>{ const t='새 카테고리'; data.categories.push({key:slug(t)+'-'+Date.now().toString(36).slice(-3),title:t,videos:[]}); render(); };

function normalize(){
  // key 자동 보정(빈 값/중복 방지)
  const seen={};
  data.categories.forEach(c=>{
    let k=c.key||slug(c.title); if(seen[k]) k=k+'-'+Date.now().toString(36).slice(-3); seen[k]=1; c.key=k;
    c.videos=(c.videos||[]).filter(v=>v.id);
  });
  data.hero=extractId(data.hero||'');
}
$('#previewBtn').onclick=()=>{ normalize(); localStorage.setItem(LS_KEY,JSON.stringify(data)); toast('미리보기 저장됨 — 사이트 새로고침'); };
$('#cloudSaveBtn').onclick=async()=>{
  if(!SB || !SB.isConfigured()){ alert('Supabase가 설정되지 않았습니다. supabase.js 에 URL/KEY를 입력하세요.'); return; }
  if(!authToken){ alert('먼저 로그인하세요 (우측 상단).'); return; }
  normalize();
  const btn=$('#cloudSaveBtn'); const old=btn.textContent; btn.disabled=true; btn.textContent='저장 중…';
  try{
    await SB.saveWorks(data, authToken);
    localStorage.setItem(LS_KEY,JSON.stringify(data)); // 로컬도 동기화
    toast('☁ 클라우드 저장 완료 — 공개 사이트 반영됨');
  }catch(err){
    if(/401|403|JWT|token/i.test(err.message)){
      authToken=null; try{ sessionStorage.removeItem(TOKEN_KEY); }catch(e){} refreshAuthUI();
      alert('세션이 만료되었습니다. 다시 로그인 후 저장하세요.');
    }else{
      alert('클라우드 저장 실패: '+err.message);
    }
  }finally{ btn.disabled=false; btn.textContent=old; }
};
$('#downloadBtn').onclick=()=>{ normalize(); const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='works.json'; a.click(); toast('works.json 다운로드'); };
$('#reloadDefault').onclick=()=>{ if(confirm('기본값으로 되돌릴까요? (저장 전까지 반영 안 됨)')){ data=structuredClone(DEFAULT_WORKS); $('#hero').value=data.hero; render(); } };
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ data=JSON.parse(r.result); $('#hero').value=data.hero||''; render(); toast('가져오기 완료'); }catch(err){ alert('JSON 파싱 오류: '+err.message); } }; r.readAsText(f); };

init();

</script>
</body>
</html>
